<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
      }
    </style>
  </head>
  <link rel="stylesheet" href="../css/style.css" />
  <body class="body-cadastro">
    <nav class="menu-navegacao">
      <h1 class="titulo-site-2">Comunidade Dev</h1>
      <a href="../index.html" class="link-menu">Início</a>
    </nav>
    <main class="conteudo-principal">
      <h2 class="subtitulo">Junte-se a nós</h2>
      <p>
        Preencha os dados abaixo para recebes nossos avisos e participar dos
        encontros
      </p>
      <form class="formulario-cadastro">
        <label for="nome" class="rotulo-campo">Seu nome:</label>
        <input
          type="text"
          id="nome"
          class="campo-entrada"
          placeholder="Digite seu nome completo"
        />

        <label for="email" class="rotulo-campo">Seu E-mail:</label>
        <input
          type="email"
          id="email"
          class="campo-entrada"
          placeholder="nome@exemplo.com"
        />

        <button type="submit" class="botao-enviar">Quero Participar</button>
      </form>
    </main>
  </body>
</html>
